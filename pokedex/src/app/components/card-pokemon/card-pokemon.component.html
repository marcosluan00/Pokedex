
<main class="grid sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4">
    <section *ngFor="let pokemon of pokemonList" class="bg-slate-50 max-w-6xl">

        <a class="bg-[#2bdc75] p-2 shadow-md rounded-md grid grid-cols-2 m-3 hover:scale-110" routerLink="/pokemon/{{pokemon.id}}">
            <div class="p-1">
                <p class="text-xl font-bold text-slate-100">{{ pokemon.name | uppercase}}</p>
        
                <div class="badge p-1 mt-1 mr-12 text-center" *ngFor="let type of pokemon.detailsPokemon.types">
                    <p class="text-xs font-semibold  text-slate-50 uppercase">{{ type }}</p>
                </div>
        
            </div>
            <div>
                <img src="{{ pokemon.detailsPokemon.sprites }}" alt="{{ pokemon?.name }}" class="w-32 h-32 drop-shadow-lg ">
            </div>
        </a>
        
    </section>

            {{ p.name }}

</main>

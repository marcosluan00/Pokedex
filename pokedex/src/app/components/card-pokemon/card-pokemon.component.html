<main class="mx-6 grid sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4

">
    <ng-container *ngIf="(pokemonRequest  | async) as pokemonR">
        <ng-container *ngIf="pokemonR.details">
            
                <section *ngFor="let pokemon of pokemonR.details |async, let i = index" class="bg-slate-50 max-w-6xl">

                    <a class="p-2 bg-green-500 shadow-md rounded-md grid grid-cols-2 xl:m-3 hover:scale-105 
                    md:m-2 sm:m-1" routerLink="/pokemon/{{i+1}}"
                    [ngStyle]="{
                        
                    }">
                        <div class="p-1">
                            <p class="text-xl font-bold text-slate-100">{{ pokemon.name | uppercase}}</p>
                            <div class="badge p-1 mt-1 mr-12 text-center" *ngFor="let type of pokemon.types">
                                <p class="text-xs font-semibold  text-slate-50 uppercase">{{ type }}</p>
                            </div>
                    
                        </div>
                        <div>
                            <img src="{{ pokemon.sprites.artwork_default }}" alt="{{ pokemon.name }}" class="w-32 h-32 drop-shadow-lg ">
                        </div>
                    </a>
                    
                </section>

        </ng-container>
        

    </ng-container>
    

</main>

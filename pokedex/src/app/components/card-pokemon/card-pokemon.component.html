<section class="bg-[#2bdc75] p-2 shadow-md rounded-md
grid grid-cols-2
m-1">
    <div class="p-1">
        <p class="text-xl font-bold text-slate-100">{{ receberLista.name | uppercase}}</p>

        <div class="glass p-1 mt-1 mr-12 text-center" *ngFor="let type of receberLista.detailsPokemon.types">
            <p class="text-xs font-semibold  text-slate-50 uppercase">{{ type }}</p>
        </div>

    </div>
    <div>
        <img src="{{ receberLista.detailsPokemon.sprites }}" alt="Bulbassaur" class="w-32 h-32">
    </div>
</section>
